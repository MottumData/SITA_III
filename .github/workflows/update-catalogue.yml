name: Update Catalogue Data

on:
  push:
    paths:
      - 'data/*.csv'

permissions:
  contents: write

jobs:
  update-latest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy newest CSV to data/latest.csv
        run: |
          NEWEST=$(ls -t data/*.csv | grep -v 'data/latest\.csv' | head -1)
          echo "Latest CSV: $NEWEST"
          cp "$NEWEST" data/latest.csv

      - name: Commit data/latest.csv
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.csv
          git diff --staged --quiet || git commit -m "chore: update data/latest.csv from ${{ github.sha }}"
          git push
